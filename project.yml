name: SnakeXtreme
options:
  bundleIdPrefix: com.pixelatedstudios.sx
  deploymentTarget:
    iOS: '18.0'

configs:
  Debug:
    buildSettings:
      SWIFT_OPTIMIZATION_LEVEL: '-Onone'
  Release:
    buildSettings:
      SWIFT_OPTIMIZATION_LEVEL: '-O'

targets:
  SnakeXtreme:
    type: application
    platform: iOS
    deploymentTarget: '18.0'
    sources: [SnakeXtreme]
    info:
      path: SnakeXtreme/Info.plist   # <- now a dictionary
    buildSettings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: ""
      INFOPLIST_FILE: SnakeXtreme/Info.plist

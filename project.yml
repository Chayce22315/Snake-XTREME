name: SnakeXtreme

options:
  bundleIdPrefix: com.pixelatedstudios.sx
  deploymentTarget:
    iOS: '18.0'

configs:
  Debug:
    buildSettings:
      SWIFT_OPTIMIZATION_LEVEL: '-Onone'
  Release:
    buildSettings:
      SWIFT_OPTIMIZATION_LEVEL: '-O'

targets:
  SnakeXtreme:
    type: application
    platform: iOS
    deploymentTarget: '18.0'

    sources:
      - path: SnakeXtreme
        excludes:
          - "**/*.plist"   # prevent plist confusion

    info:
      path: SnakeXtreme/Info.plist

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.sx
        INFOPLIST_FILE: SnakeXtreme/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        SKIP_INSTALL: NO

schemes:
  SnakeXtreme:
    build:
      targets:
        SnakeXtreme: all

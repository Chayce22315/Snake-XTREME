name: Build SnakeXtreme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important for full repo

      # 2️⃣ clean derived data
      - name: Clean Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/*

      # 3️⃣ set plist path if needed
      - name: Confirm Info.plist exists
        run: |
          if [ ! -f SnakeXtreme/Info.plist ]; then
            echo "Info.plist not found! Check path in project."
            exit 1
          fi

      # 4️⃣ build & archive
      - name: Build & Archive
        run: |
          xcodebuild \
            -project SnakeXtreme.xcodeproj \
            -scheme SnakeXtreme \
            -configuration Release \
            -archivePath $PWD/build/SnakeXtreme.xcarchive \
            archive

      # 5️⃣ export IPA
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/SnakeXtreme.xcarchive \
            -exportPath $PWD/build/SnakeXtreme \
            -exportOptionsPlist SnakeXtreme/ExportOptions.plist

      # 6️⃣ upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SnakeXtreme.ipa
          path: build/SnakeXtreme/*.ipa

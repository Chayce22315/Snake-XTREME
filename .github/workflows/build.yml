name: iOS Build SnakeXtreme

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Ruby & CocoaPods
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2

    - name: Install Bundler
      run: gem install bundler

    - name: Install CocoaPods
      run: pod install --repo-update || echo "No Podfile found, skipping"

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate --spec project.yml

    - name: Build & Archive
      run: |
        mkdir -p build
        xcodebuild archive \
          -project SnakeXtreme.xcodeproj \
          -scheme SnakeXtreme \
          -configuration Release \
          -archivePath build/SnakeXtreme.xcarchive \
          DEVELOPMENT_TEAM="" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          INFOPLIST_FILE=SnakeXtreme/Info.plist

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/SnakeXtreme.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist exportOptions.plist

    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnakeXtreme-IPA
        path: build/ipa/*.ipa

name: SnakeXtreme Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      # 1️⃣ checkout code
      - uses: actions/checkout@v4

      # 2️⃣ install xcodegen
      - run: brew install xcodegen

      # 3️⃣ generate Xcode project
      - run: xcodegen generate

      # 4️⃣ create build folder
      - run: mkdir -p build

      # 5️⃣ archive project (unsigned)
      - run: |
          xcodebuild -scheme SnakeXtreme \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/SnakeXtreme.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO

      # 6️⃣ export IPA
      - run: |
          xcodebuild -exportArchive \
                     -archivePath build/SnakeXtreme.xcarchive \
                     -exportPath build/SnakeXtreme.ipa \
                     -exportOptionsPlist exportOptions.plist

      # 7️⃣ upload IPA artifact
      - uses: actions/upload-artifact@v4
        with:
          name: SnakeXtreme.ipa
          path: build/SnakeXtreme.ipa

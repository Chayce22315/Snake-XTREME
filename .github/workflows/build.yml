name: Build SnakeXtreme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install xcodegen
        # ruby/cocoapods optional if you need them for other projects

    - name: Generate Xcode project
      run: xcodegen generate --spec project.yml

    - name: Build archive (no signing)
      run: |
        mkdir -p build
        xcodebuild -project SnakeXtreme.xcodeproj \
                   -scheme SnakeXtreme \
                   -configuration Release \
                   -archivePath $GITHUB_WORKSPACE/build/SnakeXtreme.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO

    - name: Upload .app artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnakeXtreme.app
        path: build/SnakeXtreme.xcarchive/Products/Applications/SnakeXtreme.app

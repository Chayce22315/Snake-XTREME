name: Build SnakeXtreme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ get the code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ install xcodegen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 3️⃣ generate the Xcode project
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec "${{ github.workspace }}/project.yml" --quiet

      # 4️⃣ build & archive
      - name: Build & Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project "${{ github.workspace }}/SnakeXtreme.xcodeproj" \
            -scheme "SnakeXtreme" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/SnakeXtreme.xcarchive" \
            INFOPLIST_FILE="${{ github.workspace }}/SnakeXtreme/Info.plist"

      # 5️⃣ export ipa
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/SnakeXtreme.xcarchive" \
            -exportPath "${{ github.workspace }}/build" \
            -exportOptionsPlist "${{ github.workspace }}/ExportOptions.plist"

      # 6️⃣ upload ipa as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SnakeXtreme.ipa
          path: "${{ github.workspace }}/build/SnakeXtreme.ipa"

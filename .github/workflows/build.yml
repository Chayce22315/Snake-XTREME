name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Swift Files
        run: |
          echo "=== SWIFT FILES ==="
          find . -name "*.swift"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build .app (no signing)
        run: |
          mkdir -p build
          xcodebuild \
            -project SnakeXtreme.xcodeproj \
            -scheme SnakeXtreme \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Copy .app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SnakeXtreme.app" -type d | head -n 1)
          echo "APP FOUND AT: $APP_PATH"
          cp -R "$APP_PATH" build/

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: SnakeXtreme-app
          path: build/SnakeXtreme.app
